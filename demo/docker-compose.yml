services:
  # Sample-data generator: emits the exporter's exact metrics with realistic,
  # moving frame data so the dashboard populates without a Windows box.
  # For production, drop this service and point prometheus at your real exporter.
  frame-sim:
    image: python:3-slim
    command: ["python", "/app/frame_sim.py"]
    volumes:
      - ./frame_sim.py:/app/frame_sim.py:ro
    expose: ["9111"]

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [frame-sim]

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
