groups:
  - name: kiosk
    rules:
      # THE freeze alert: the app process is alive but producing no frames —
      # crash-to-dialog, hang, or GPU TDR aftermath. "healthy but dead."
      # Requires presentmon to target the SAME app kiosk-scripts manages.
      - alert: KioskAppFrozen
        expr: (kiosk_app_up == 1) and on(instance) (presentmon_up == 0)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }}: app alive but not rendering"
          description: "kiosk_app_up=1 but presentmon_up=0 for 2m — process healthy but no frames presenting (crash-to-dialog, freeze, or GPU TDR aftermath)."

      # Simpler backstop: not presenting at all (covers app-down or frozen).
      - alert: KioskNotPresenting
        expr: presentmon_up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} / {{ $labels.app }}: no frames for 5m"
